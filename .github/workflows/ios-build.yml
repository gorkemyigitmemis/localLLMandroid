name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Install Ruby and CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Download GGUF Model
        run: |
          mkdir -p assets/models
          curl -L "https://huggingface.co/bartowski/gemma-2-2b-it-GGUF/resolve/main/gemma-2-2b-it-Q4_K_M.gguf" -o assets/models/gemma.gguf

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build iOS App
        run: |
          # --- TROJAN HORSE BYPASS ---
          # Move the real 1.7GB model to a temp location to avoid Metro Bundler V8 limits
          mv assets/models/gemma.gguf /tmp/gemma_real.gguf
          # Create a 0-byte dummy file in its place so the bundler successfully processes the asset map
          touch assets/models/gemma.gguf

          export NODE_OPTIONS="--max_old_space_size=8192"
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios --reset-cache
          
          export SKIP_BUNDLING=1
          xcodebuild clean build -workspace ios/LocalLLMios.xcworkspace \
            -scheme LocalLLMios \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/LocalLLMios.app Payload/

          # --- TROJAN HORSE INJECTION ---
          # Find the dummy file inside the compiled app and replace it with the real model
          DUMMY_PATH=$(find Payload/LocalLLMios.app -name "gemma.gguf" | head -n 1)
          if [ -n "$DUMMY_PATH" ]; then
            echo "Replacing dummy file at $DUMMY_PATH with real model..."
            mv /tmp/gemma_real.gguf "$DUMMY_PATH"
          else
            echo "Warning: Dummy model not found! Placing it in default assets folder."
            mkdir -p Payload/LocalLLMios.app/assets/models
            mv /tmp/gemma_real.gguf Payload/LocalLLMios.app/assets/models/gemma.gguf
          fi

          zip -r LocalLLMios.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalLLMios-IPA
          path: LocalLLMios.ipa
